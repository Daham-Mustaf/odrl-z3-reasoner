# =============================================================================
# ODRL LeftOperand Registry - Complete Specification with Unit Grounding
# =============================================================================
# 
# Classification Summary:
#   𝓛_xsd (14) + 𝓛_vocab (1) + 𝓛_ref (2) + 𝓛_sem (14) + 𝓛_run (1) = 32
#
# Static Analyzability:
#   FULL: 15 (47%)       - Fully analyzable with SMT
#   PARTIAL: 2 (6%)      - Reference-point dependent
#   GROUNDED: 14 (44%)   - Requires external KB/oracle
#   RUNTIME: 1 (3%)      - Runtime only
#
# Unit Grounding:
#   Standard: QUDT (Quantities, Units, Dimensions, and Types)
#   Source: https://qudt.org/vocab/unit
#   Local: src/grounding/unit/data/qudt-units-odrl.ttl
#   Oracle: src/grounding/unit/oracle.py
# =============================================================================

# =============================================================================
# 𝓛_bounded — Bounded [0,100] (5 LeftOperands)
# =============================================================================

percentage:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain: { min: 0, max: 100 }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Percentage amount of target Asset (0-100)"

relativePosition:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain: { min: 0, max: 100 }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Relative position within asset as percentage"

relativeSize:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain: { min: 0, max: 100 }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  note: "ODRL permits >100%, ODRL-SA bounds to [0,100] for soundness"
  description: "Relative size as percentage of original"

relativeTemporalPosition:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain: { min: 0, max: 100 }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Relative temporal position as percentage"

relativeSpatialPosition:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain: { min: 0, max: 100 }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Relative spatial position as percentage"

# =============================================================================
# 𝓛_int — Integer Unbounded (1 LeftOperand)
# =============================================================================

count:
  class: FULL
  category: L_int
  z3_sort: Int
  domain: { min: 0, max: null }
  normalizer: to_integer
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  scope_operand: unitOfCount
  description: "Number of times action can be performed"

# =============================================================================
# 𝓛_duration — Time Durations (3 LeftOperands)
# =============================================================================

timeInterval:
  class: FULL
  category: L_duration
  z3_sort: Int
  domain: { min: 1, max: null }  # min=1, not 0
  normalizer: duration_to_seconds
  rejects: [P1M, P1Y]
  operators: [eq]
  invalid_operators: [neq, lt, lteq, gt, gteq, isA, hasPart, isPartOf, isAnyOf, isNoneOf, isAllOf]
  unit:
    required: false
    implicit: seconds
  note: "Only equality operator is meaningful for recurring intervals"
  description: "Recurring time interval between executions (seconds)"

elapsedTime:
  class: PARTIAL
  category: L_duration
  z3_sort: Int
  domain: { min: 0, max: null }
  normalizer: duration_to_seconds
  operators: [eq, neq, lt, lteq, gt, gteq]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: false
    implicit: seconds
  reference_point: policy_activation
  note: "Full analysis requires runtime context"
  description: "Elapsed time since policy activation"

delayPeriod:
  class: PARTIAL
  category: L_duration
  z3_sort: Int
  domain: { min: 0, max: null }
  normalizer: duration_to_seconds
  operators: [eq, neq, lt, lteq, gt, gteq]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: false
    implicit: seconds
  reference_point: triggering_event
  note: "Full analysis requires runtime context"
  description: "Delay period after triggering event"

# =============================================================================
# 𝓛_datetime — Temporal Instant (1 LeftOperand)
# =============================================================================

dateTime:
  class: FULL
  category: L_datetime
  z3_sort: Int
  domain: { min: null, max: null }
  normalizer: datetime_to_timestamp
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  restricted_operators: [isAllOf]
  invalid_operators: [isA, hasPart, isPartOf]
  accepts: [xsd:dateTime, xsd:date]
  timezone_default: UTC
  note: "DateTime values normalized to Unix timestamp (seconds)"
  description: "Absolute point in time for exercising action"

# =============================================================================
# 𝓛_unit — Unit-Dependent (6 LeftOperands)
# Comparability: Same unit required (different units → UNKNOWN)
# =============================================================================

payAmount:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain: { min: 0, max: null }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: true
    operand: unit
    category: currency
    standard: "ISO 4217 / QUDT"
    grounding: "src/grounding/unit/oracle.py"
    known_units:
      EUR: "http://qudt.org/vocab/unit/EUR"
      USD: "http://qudt.org/vocab/unit/USD"
      GBP: "http://qudt.org/vocab/unit/GBP"
      JPY: "http://qudt.org/vocab/unit/JPY"
      CHF: "http://qudt.org/vocab/unit/CHF"
      CAD: "http://qudt.org/vocab/unit/CAD"
      AUD: "http://qudt.org/vocab/unit/AUD"
      CNY: "http://qudt.org/vocab/unit/CNY"
      INR: "http://qudt.org/vocab/unit/INR"
      BRL: "http://qudt.org/vocab/unit/BRL"
    aliases:
      "http://dbpedia.org/resource/Euro": EUR
      "http://iso.org/4217/EUR": EUR
      "euro": EUR
      "dollar": USD
  comparability: { same_unit_required: true, different_units: UNKNOWN }
  description: "Payment amount (unit-dependent: EUR, USD, etc.)"

resolution:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain: { min: 0, max: null, exclusive_min: true }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: true
    operand: unit
    category: resolution
    standard: "QUDT"
    grounding: "src/grounding/unit/oracle.py"
    known_units:
      DPI: "http://qudt.org/vocab/unit/DPI"
      PPI: "http://qudt.org/vocab/unit/PPI"
      DPCM: "http://qudt.org/vocab/unit/DPCM"
    aliases:
      "dpi": DPI
      "ppi": PPI
      "dots per inch": DPI
  comparability: { same_unit_required: true, different_units: UNKNOWN }
  description: "Resolution constraint (DPI, PPI)"

absolutePosition:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain: { min: 0, max: null }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: true
    operand: unit
    category: position
    standard: "QUDT"
    grounding: "src/grounding/unit/oracle.py"
    known_units:
      SEC: "http://qudt.org/vocab/unit/SEC"
      MIN: "http://qudt.org/vocab/unit/MIN"
      BYTE: "http://qudt.org/vocab/unit/BYTE"
      PIXEL: "http://qudt.org/vocab/unit/PX"
    aliases:
      "seconds": SEC
      "bytes": BYTE
      "px": PIXEL
  comparability: { same_unit_required: true, different_units: UNKNOWN }
  description: "Absolute position (seconds, bytes, pixels)"

absoluteSize:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain: { min: 0, max: null, exclusive_min: true }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: true
    operand: unit
    category: size
    standard: "QUDT"
    grounding: "src/grounding/unit/oracle.py"
    known_units:
      BYTE: "http://qudt.org/vocab/unit/BYTE"
      KiloBYTE: "http://qudt.org/vocab/unit/KiloBYTE"
      MegaBYTE: "http://qudt.org/vocab/unit/MegaBYTE"
      GigaBYTE: "http://qudt.org/vocab/unit/GigaBYTE"
      PIXEL: "http://qudt.org/vocab/unit/PX"
      M: "http://qudt.org/vocab/unit/M"
      CM: "http://qudt.org/vocab/unit/CentiM"
      MM: "http://qudt.org/vocab/unit/MilliM"
    aliases:
      "bytes": BYTE
      "kb": KiloBYTE
      "mb": MegaBYTE
      "gb": GigaBYTE
      "px": PIXEL
  comparability: { same_unit_required: true, different_units: UNKNOWN }
  description: "Absolute size (bytes, pixels, physical units)"

absoluteTemporalPosition:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain: { min: 0, max: null }
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit:
    required: true
    operand: unit
    category: time
    standard: "QUDT"
    grounding: "src/grounding/unit/oracle.py"
    known_units:
      SEC: "http://qudt.org/vocab/unit/SEC"
      MIN: "http://qudt.org/vocab/unit/MIN"
      HR: "http://qudt.org/vocab/unit/HR"
    aliases:
      "seconds": SEC
      "s": SEC
      "minutes": MIN
    default: SEC
  reference_point: media_start
  description: "Absolute temporal position in media"

absoluteSpatialPosition:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain: { min: 0, max: null }
  normalizer: to_float
  operators: [eq, neq]
  invalid_operators: [isA, hasPart, isPartOf, lt, lteq, gt, gteq]
  unit:
    required: true
    operand: unit
    category: spatial
    standard: "QUDT"
    grounding: "src/grounding/unit/oracle.py"
    known_units:
      PIXEL: "http://qudt.org/vocab/unit/PX"
      M: "http://qudt.org/vocab/unit/M"
      CM: "http://qudt.org/vocab/unit/CentiM"
      MM: "http://qudt.org/vocab/unit/MilliM"
    aliases:
      "px": PIXEL
      "mm": MM
  note: "Ordering operators require geometric semantics"
  description: "Absolute spatial position (2D/3D coordinates)"

# =============================================================================
# 𝓛_vocab — Vocabulary-Based (1 LeftOperand)
# =============================================================================

unitOfCount:
  class: FULL
  category: L_vocab
  z3_sort: String
  domain:
    enum: [perUser, perDevice, perOrganization, perSession]
    extensible: true
  normalizer: none
  operators: [eq, neq, isAnyOf, isNoneOf]
  invalid_operators: [lt, lteq, gt, gteq, isA, hasPart, isPartOf]
  description: "Unit of count (closed vocabulary, extensible)"

# =============================================================================
# 𝓛_sem — Requires External KB (14 LeftOperands)
# =============================================================================

language:
  class: GROUNDED
  category: L_sem
  oracle: bcp47
  grounding: "src/grounding/language/oracle.py"
  external_kb: [ISO639, LCC, Lexvo]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Language constraint (BCP47 hierarchy)"

spatial:
  class: GROUNDED
  category: L_sem
  oracle: geonames
  external_kb: [GeoNames, ISO3166]
  operators: [eq, neq, isA, isAnyOf, isNoneOf, isPartOf]
  description: "Spatial/geographic constraint"

spatialCoordinates:
  class: GROUNDED
  category: L_sem
  oracle: geosparql
  external_kb: [GeoSPARQL, WGS84]
  operators: [eq, neq]
  description: "Spatial coordinates (requires geometric reasoning)"

event:
  class: GROUNDED
  category: L_sem
  oracle: event
  external_kb: [Schema.org, custom]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Event constraint"

media:
  class: GROUNDED
  category: L_sem
  oracle: media
  external_kb: [custom]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Media type constraint"

industry:
  class: GROUNDED
  category: L_sem
  oracle: industry
  external_kb: [NAICS, ISIC, NACE]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Industry sector constraint"

purpose:
  class: GROUNDED
  category: L_sem
  oracle: dpv
  grounding: "src/grounding/purpose/loader.py"
  external_kb: [DPV]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Purpose constraint (DPV taxonomy)"

recipient:
  class: GROUNDED
  category: L_sem
  oracle: recipient
  external_kb: [FOAF, vCard]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Recipient constraint"

product:
  class: GROUNDED
  category: L_sem
  oracle: product
  external_kb: [UNSPSC, GPC]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Product constraint"

deliveryChannel:
  class: GROUNDED
  category: L_sem
  oracle: delivery_channel
  external_kb: [custom, profile]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Delivery channel constraint"

systemDevice:
  class: GROUNDED
  category: L_sem
  oracle: system_device
  external_kb: [custom, profile]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "System/device constraint"

fileFormat:
  class: GROUNDED
  category: L_sem
  oracle: iana_media_types
  grounding: "src/grounding/file_format/oracle.py"
  external_kb: [PRONOM, IANA]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "File format constraint (IANA media types)"

virtualLocation:
  class: GROUNDED
  category: L_sem
  oracle: virtual_location
  external_kb: [DNS, IP]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Virtual location constraint"

version:
  class: GROUNDED
  category: L_sem
  oracle: semver
  external_kb: [SemVer, custom]
  operators: [eq, neq, lt, lteq, gt, gteq]
  note: "Requires version parsing and comparison logic"
  description: "Version string constraint"

# =============================================================================
# 𝓛_run — Runtime Only (1 LeftOperand)
# =============================================================================

meteredTime:
  class: RUNTIME
  category: L_run
  z3_sort: Int
  domain: { min: 0, max: null }
  operators: [eq, neq, lt, lteq, gt, gteq]
  note: "Requires cumulative usage tracking at runtime"
  description: "Metered time (cumulative usage)"

# =============================================================================
# DEPRECATED (2 LeftOperands)
# =============================================================================

device:
  class: DEPRECATED
  deprecated_by: systemDevice
  description: "Deprecated - use systemDevice"

system:
  class: DEPRECATED
  deprecated_by: systemDevice
  description: "Deprecated - use systemDevice"