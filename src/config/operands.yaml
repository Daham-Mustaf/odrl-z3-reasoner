# =============================================================================
# ODRL-SA LeftOperand Configuration
# =============================================================================
#
# This is the SINGLE SOURCE OF TRUTH for the ODRL-SA formalism.
# All modules read from this configuration via the OperandRegistry.
#
# To change the formalism:
#   1. Edit this file
#   2. That's it! All modules automatically pick up changes.
#
# Structure per operand:
#   class: FULL | PARTIAL | GROUNDED | DEFERRED | RUNTIME
#   category: numeric | temporal | positional | categorical | identity
#   z3_sort: Int | Real | String | Bool (for SMT encoding)
#   domain:
#     min: number or null (for -infinity)
#     max: number or null (for +infinity)
#   normalize: normalization function name
#   operators: list of valid operators
#   oracle: oracle class name (for GROUNDED)
#   reference_point: reference point type (for PARTIAL)
#
# =============================================================================

# =============================================================================
# FULL CLASS (L_xsd) - XSD-typed, fully analyzable via SMT
# Total: 14 operands
# =============================================================================

# -----------------------------------------------------------------------------
# Numeric (4)
# -----------------------------------------------------------------------------
count:
  class: FULL
  category: numeric
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalize: to_integer
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Number of times action can be performed"

percentage:
  class: FULL
  category: numeric
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Percentage value (0-100)"

payAmount:
  class: FULL
  category: numeric
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalize: to_float
  unit_required: true
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Payment amount (requires unit for currency)"

resolution:
  class: FULL
  category: numeric
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalize: to_float
  unit_required: true
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Resolution value (DPI, PPI, etc.)"

# -----------------------------------------------------------------------------
# Temporal - Absolute (2)
# -----------------------------------------------------------------------------
dateTime:
  class: FULL
  category: temporal
  z3_sort: Int
  domain:
    min: null
    max: null
  normalize: datetime_to_timestamp
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Absolute point in time (ISO 8601)"

timeInterval:
  class: FULL
  category: temporal
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalize: duration_to_seconds
  operators: [eq]
  operator_note: "ODRL spec: Only eq operator SHOULD be used"
  description: "Recurring time interval duration"

# -----------------------------------------------------------------------------
# Positional - Absolute (4)
# -----------------------------------------------------------------------------
absolutePosition:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Absolute position in media (seconds/bytes)"

absoluteSize:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Absolute size (bytes/pixels)"

absoluteSpatialPosition:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalize: to_float
  operators: [eq, neq]
  operator_note: "Spatial coordinates - typically equality only"
  description: "Absolute x,y position in visual media"

absoluteTemporalPosition:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Absolute time position in media (seconds)"

# -----------------------------------------------------------------------------
# Positional - Relative (4)
# -----------------------------------------------------------------------------
relativePosition:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Relative position (0-100%)"

relativeSize:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Relative size (0-100%)"

relativeSpatialPosition:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Relative x,y position (0-100%)"

relativeTemporalPosition:
  class: FULL
  category: positional
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalize: to_float
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Relative time position (0-100%)"


# =============================================================================
# PARTIAL CLASS (L_ref) - Reference-point dependent
# Total: 2 operands
# =============================================================================

elapsedTime:
  class: PARTIAL
  category: temporal
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalize: duration_to_seconds
  reference_point: policy_activation
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Time elapsed since policy activation"
  comparability_note: "Only comparable with same reference point"

delayPeriod:
  class: PARTIAL
  category: temporal
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalize: duration_to_seconds
  reference_point: triggering_event
  operators: [eq, neq, lt, lteq, gt, gteq]
  description: "Delay period before action is allowed"
  comparability_note: "Only comparable with same reference point"


