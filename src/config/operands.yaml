# =============================================================================
# ODRL LeftOperand Registry - Final Classification
# =============================================================================
# Based on formal classification:
#   𝓛_xsd (14) + 𝓛_vocab (1) + 𝓛_ref (2) + 𝓛_sem (14) + 𝓛_run (1) = 32
#
# Static Analyzability:
#   Fully Analyzable: 15 (47%)
#   Partially Analyzable: 2 (6%)
#   Requires External/Runtime: 15 (47%)
# =============================================================================

# =============================================================================
# 𝓛_bounded — Bounded [0,100] (5 LeftOperands)
# SMT Theory: QF-LRA
# Operators: 9/12 (eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf, isAllOf*)
# =============================================================================

percentage:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Percentage amount of target Asset (0-100)"

relativePosition:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Relative position within asset as percentage"

relativeSize:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  note: "ODRL permits >100%, ODRL-SA bounds to [0,100] for soundness"
  description: "Relative size as percentage of original"

relativeTemporalPosition:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Relative temporal position as percentage"

relativeSpatialPosition:
  class: FULL
  category: L_bounded
  z3_sort: Real
  domain:
    min: 0
    max: 100
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Relative spatial position as percentage"

# =============================================================================
# 𝓛_int — Integer Unbounded (2 LeftOperands)
# SMT Theory: QF-LIA
# =============================================================================

count:
  class: FULL
  category: L_int
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalizer: to_integer
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  scope_operand: unitOfCount
  description: "Number of times action can be performed"

timeInterval:
  class: FULL
  category: L_int
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalizer: to_duration
  operators: [eq]
  invalid_operators: [isA, hasPart, isPartOf, lt, lteq, gt, gteq]
  note: "Only equality operator is meaningful for recurring intervals"
  description: "Recurring time interval"

# =============================================================================
# 𝓛_datetime — Temporal Instant (1 LeftOperand)
# SMT Theory: QF-LIA (normalized to Unix timestamp)
# =============================================================================

dateTime:
  class: FULL
  category: L_datetime
  z3_sort: Int
  domain:
    min: null
    max: null
  normalizer: datetime_to_timestamp  # <-- This must match the function name
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  description: "Date/time constraint (normalized to Unix timestamp)"

# =============================================================================
# 𝓛_unit — Unit-Dependent (4 LeftOperands)
# SMT Theory: QF-LRA
# Comparability: Same unit required
# =============================================================================

payAmount:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit_operand: unit
  unit_type: monetary
  description: "Payment amount (unit-dependent: EUR, USD, etc.)"

resolution:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain:
    min: 0
    max: null
    exclusive_min: true
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit_operand: unit
  unit_type: physical
  description: "Resolution constraint (DPI, PPI)"

absolutePosition:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit_operand: unit
  unit_type: physical
  description: "Absolute position (seconds, bytes, etc.)"

absoluteSize:
  class: FULL
  category: L_unit
  z3_sort: Real
  domain:
    min: 0
    max: null
    exclusive_min: true
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  unit_operand: unit
  unit_type: physical
  description: "Absolute size (bytes, pixels)"

# =============================================================================
# 𝓛_real — Unbounded Real (1 LeftOperand)
# SMT Theory: QF-LRA
# =============================================================================

absoluteTemporalPosition:
  class: FULL
  category: L_real
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalizer: to_float
  operators: [eq, neq, lt, lteq, gt, gteq, isAnyOf, isNoneOf]
  invalid_operators: [isA, hasPart, isPartOf]
  implicit_unit: seconds
  description: "Absolute temporal position (implicit: seconds)"

# =============================================================================
# 𝓛_coords — Spatial Coordinates (1 LeftOperand)
# SMT Theory: QF-LRA (multi-dimensional)
# Operators: Only eq/neq meaningful statically
# =============================================================================

absoluteSpatialPosition:
  class: FULL
  category: L_coords
  z3_sort: Real
  domain:
    min: 0
    max: null
  normalizer: to_float
  operators: [eq, neq]
  invalid_operators: [isA, hasPart, isPartOf, lt, lteq, gt, gteq]
  note: "Ordering operators require geometric semantics beyond ODRL-SA scope"
  description: "Absolute spatial position (2D/3D coordinates)"

# =============================================================================
# 𝓛_vocab — Vocabulary-Based (1 LeftOperand)
# SMT Theory: QF-UF
# =============================================================================

unitOfCount:
  class: FULL
  category: L_vocab
  z3_sort: String
  domain:
    enum: [perUser, perDevice, perOrganization, perSession]
    extensible: true
  normalizer: none
  operators: [eq, neq, isAnyOf, isNoneOf]
  invalid_operators: [lt, lteq, gt, gteq, isA, hasPart, isPartOf]
  description: "Unit of count (closed vocabulary, extensible)"

# =============================================================================
# 𝓛_ref — Reference-Point Dependent (2 LeftOperands)
# SMT Theory: QF-LIA
# Static Analysis: ⚠️ Partial (assumes policy activation as reference)
# =============================================================================

elapsedTime:
  class: PARTIAL
  category: L_ref
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalizer: to_duration
  operators: [eq, neq, lt, lteq, gt, gteq]
  invalid_operators: [isA, hasPart, isPartOf]
  reference_point: policy_activation
  note: "Full analysis requires runtime context"
  description: "Elapsed time since policy activation"

delayPeriod:
  class: PARTIAL
  category: L_ref
  z3_sort: Int
  domain:
    min: 0
    max: null
  normalizer: to_duration
  operators: [eq, neq, lt, lteq, gt, gteq]
  invalid_operators: [isA, hasPart, isPartOf]
  reference_point: triggering_event
  note: "Full analysis requires runtime context"
  description: "Delay period after triggering event"

# =============================================================================
# 𝓛_sem — Requires External KB (14 LeftOperands)
# Static Analysis: ❌ Requires oracle/grounding
# =============================================================================

language:
  class: GROUNDED
  category: L_sem
  oracle: bcp47
  external_kb: [ISO639, LCC, Lexvo]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Language constraint (BCP47 hierarchy)"

spatial:
  class: GROUNDED
  category: L_sem
  oracle: geonames
  external_kb: [GeoNames, ISO3166]
  operators: [eq, neq, isA, isAnyOf, isNoneOf, isPartOf]
  description: "Spatial/geographic constraint"

spatialCoordinates:
  class: GROUNDED
  category: L_sem
  oracle: geosparql
  external_kb: [GeoSPARQL, WGS84]
  operators: [eq, neq]
  description: "Spatial coordinates (requires geometric reasoning)"

event:
  class: GROUNDED
  category: L_sem
  oracle: event
  external_kb: [Schema.org, custom]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Event constraint"

media:
  class: GROUNDED
  category: L_sem
  oracle: media
  external_kb: [custom]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Media type constraint"

industry:
  class: GROUNDED
  category: L_sem
  oracle: industry
  external_kb: [NAICS, ISIC, NACE]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Industry sector constraint"

purpose:
  class: GROUNDED
  category: L_sem
  oracle: dpv
  external_kb: [DPV]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Purpose constraint (DPV taxonomy)"

recipient:
  class: GROUNDED
  category: L_sem
  oracle: recipient
  external_kb: [FOAF, vCard]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Recipient constraint"

product:
  class: GROUNDED
  category: L_sem
  oracle: product
  external_kb: [UNSPSC, GPC]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Product constraint"

deliveryChannel:
  class: GROUNDED
  category: L_sem
  oracle: delivery_channel
  external_kb: [custom, profile]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Delivery channel constraint"

systemDevice:
  class: GROUNDED
  category: L_sem
  oracle: system_device
  external_kb: [custom, profile]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "System/device constraint"

fileFormat:
  class: GROUNDED
  category: L_sem
  oracle: iana_media_types
  external_kb: [PRONOM, IANA]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "File format constraint (IANA media types)"

virtualLocation:
  class: GROUNDED
  category: L_sem
  oracle: virtual_location
  external_kb: [DNS, IP]
  operators: [eq, neq, isA, isAnyOf, isNoneOf]
  description: "Virtual location constraint"

version:
  class: GROUNDED
  category: L_sem
  oracle: semver
  external_kb: [SemVer, custom]
  operators: [eq, neq, lt, lteq, gt, gteq]
  note: "Requires version parsing and comparison logic"
  description: "Version string constraint"

# =============================================================================
# 𝓛_run — Runtime Only (1 LeftOperand)
# Static Analysis: ❌ Not possible
# =============================================================================

meteredTime:
  class: RUNTIME
  category: L_run
  z3_sort: Int
  domain:
    min: 0
    max: null
  operators: [eq, neq, lt, lteq, gt, gteq]
  note: "Requires cumulative usage tracking at runtime"
  description: "Metered time (cumulative usage)"

# =============================================================================
# DEPRECATED (2 LeftOperands)
# =============================================================================

device:
  class: DEPRECATED
  deprecated_by: systemDevice
  description: "Deprecated - use systemDevice"

system:
  class: DEPRECATED
  deprecated_by: systemDevice
  description: "Deprecated - use systemDevice"